services:
  - type: web
    name: muviz
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn muviz.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 180
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SETTINGS_MODULE
        value: muviz.settings
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: MEDIA_ROOT
        value: /tmp/media
      - key: YTDLP_PLAYER_CLIENTS
        value: auto
      - key: YTDLP_COOKIES_B64
        sync: false
      - key: SECRET_KEY
        generateValue: true
